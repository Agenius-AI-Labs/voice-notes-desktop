name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check src tests

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
      VOICE_NOTES_LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install xvfb + audio libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libpulse0 libportaudio2
      - name: Install package + dev extras
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v

  audit:
    name: pip-audit (lockfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - name: Audit pinned dependencies
        run: pip-audit --requirement requirements.lock.txt --strict --disable-pip

  lock-check:
    name: lockfile in sync with pyproject
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-tools
      - name: Regenerate lockfile and diff
        run: |
          cp requirements.lock.txt requirements.lock.txt.committed
          pip-compile --extra all --output-file=requirements.lock.txt pyproject.toml --quiet
          if ! diff -q requirements.lock.txt requirements.lock.txt.committed > /dev/null; then
            echo "::error::requirements.lock.txt is out of sync with pyproject.toml."
            echo "Run: pip-compile --extra all --output-file=requirements.lock.txt pyproject.toml"
            echo "Diff:"
            diff requirements.lock.txt.committed requirements.lock.txt || true
            exit 1
          fi
